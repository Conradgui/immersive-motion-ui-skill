<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dock House - after</title>
  <style>
    :root { font-family: Arial, Helvetica, sans-serif; background: #f1f3ef; color: #17221e; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f1f3ef; }
    button { font: inherit; }
    button:focus-visible, a:focus-visible { outline: 3px solid #a94b28; outline-offset: 3px; }
    .site-head { display: flex; justify-content: space-between; gap: 16px; padding: 18px clamp(16px, 5vw, 72px); border-bottom: 1px solid #c6d0c9; }
    .site-head a { color: inherit; text-decoration: none; }
    main { max-width: 1240px; margin: auto; padding: 34px clamp(16px, 5vw, 40px) 80px; }
    .stay-bar { display: grid; grid-template-columns: 1fr 1fr auto; gap: 18px; align-items: center; padding: 18px; border: 1px solid #b9c9c0; border-radius: 6px; background: #fbfcfa; }
    .stay-bar span { display: block; color: #53655d; font-size: 12px; }
    .stay-bar strong { font-size: 18px; }
    .stay-bar button { min-height: 40px; padding: 0 12px; border: 1px solid #1d5143; border-radius: 4px; background: #fbfcfa; color: #1d5143; }
    h1 { margin: 38px 0 8px; font-size: clamp(36px, 5vw, 64px); line-height: .96; letter-spacing: 0; }
    .intro { max-width: 660px; margin: 0 0 28px; color: #485b53; font-size: 17px; line-height: 1.5; }
    .room-list { display: grid; gap: 14px; }
    .room { display: grid; grid-template-columns: 250px minmax(0, 1fr) 205px; gap: 20px; align-items: stretch; padding: 14px; border: 1px solid #c6d0c9; border-radius: 6px; background: #fbfcfa; }
    .room[data-selected="true"] { border: 2px solid #1d5143; background: #f5faf6; }
    .room img { width: 100%; height: 196px; object-fit: cover; }
    .room h2 { margin: 2px 0 10px; font-size: 25px; }
    .room p { margin: 7px 0; line-height: 1.4; }
    .facts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 18px; color: #40564d; font-size: 14px; }
    .terms { align-self: center; display: grid; gap: 12px; padding-left: 18px; border-left: 1px solid #d6ded9; }
    .terms strong { font-size: 23px; }
    .terms small { color: #4d6158; line-height: 1.35; }
    .terms button { min-height: 42px; padding: 0 12px; border: 1px solid #1d5143; border-radius: 4px; background: #1d5143; color: #f8fbf8; font-weight: 700; }
    .summary { display: none; grid-template-columns: 1fr auto; gap: 18px; align-items: center; margin-top: 22px; padding: 18px; border: 1px solid #173f34; border-radius: 6px; background: #173f34; color: #f8fbf8; }
    .summary[data-open="true"] { display: grid; }
    .summary span { display: block; color: #cfe1d8; font-size: 13px; }
    .summary button { min-height: 42px; padding: 0 14px; border: 1px solid #f8fbf8; background: #f8fbf8; color: #173f34; font-weight: 700; }
    .live { min-height: 24px; margin-top: 16px; color: #1d5143; font-weight: 700; }
    @media (max-width: 820px) { .stay-bar { grid-template-columns: 1fr 1fr; } .stay-bar button { grid-column: 1 / -1; } .room { grid-template-columns: 1fr; } .room img { height: auto; aspect-ratio: 16 / 9; } .terms { padding: 12px 0 0; border-top: 1px solid #d6ded9; border-left: 0; } }
    @media (max-width: 480px) { .facts { grid-template-columns: 1fr; } .summary { grid-template-columns: 1fr; } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; } }
  </style>
</head>
<body>
  <header class="site-head"><strong id="hotel"></strong><a href="#stay">Change search</a></header>
  <main data-case="commerce-after">
    <section class="stay-bar" id="stay" aria-label="Stay details"><div><span>Stay</span><strong id="dates"></strong></div><div><span>Guests</span><strong id="guests"></strong></div><button type="button">Change search</button></section>
    <h1>Choose the room that fits this stay.</h1><p class="intro">All room choices show the two-night total, cancellation terms, and what is included before you select one.</p>
    <section class="room-list" id="room-list" aria-label="Available rooms"></section>
    <section class="summary" id="summary" data-total data-cancellation aria-label="Selected room summary"><div><span id="summary-room"></span><strong id="summary-total"></strong><span id="summary-cancellation"></span></div><button type="button">Continue to guest details</button></section>
    <p class="live" id="live" aria-live="polite"></p>
  </main>
  <script src="fixture.js"></script>
  <script>
    var selected;
    function total(room) { return Math.round(room.rate * fixture.stay.nights * (1 + fixture.stay.taxRate)); }
    document.querySelector("#hotel").textContent = fixture.hotel;
    document.querySelector("#dates").textContent = fixture.stay.dates + " / " + fixture.stay.nights + " nights";
    document.querySelector("#guests").textContent = fixture.stay.guests;
    document.querySelector("#room-list").innerHTML = fixture.rooms.map(function(room) { return '<article class="room" data-room="' + room.id + '"><img src="' + room.image + '" alt="' + room.name + ' at Dock House"><div><h2>' + room.name + '</h2><p>' + room.inclusion + '</p><div class="facts"><span>' + room.size + '</span><span>' + room.bed + '</span><span>' + room.occupancy + '</span><span>' + room.availability + '</span></div></div><div class="terms"><strong>$' + total(room) + '</strong><small>Two-night total including 12% taxes</small><small>' + room.cancellation + '</small><button type="button" data-room-choice="' + room.id + '">Select ' + room.name + '</button></div></article>'; }).join("");
    document.querySelectorAll("[data-room-choice]").forEach(function(button) { button.addEventListener("click", function() { selected = fixture.rooms.find(function(room) { return room.id === button.dataset.roomChoice; }); document.querySelectorAll(".room").forEach(function(row) { row.dataset.selected = String(row.dataset.room === selected.id); }); document.querySelector("#summary-room").textContent = selected.name + " selected"; document.querySelector("#summary-total").textContent = "$" + total(selected) + " total"; document.querySelector("#summary-cancellation").textContent = selected.cancellation; document.querySelector("#summary").dataset.open = "true"; document.querySelector("#live").textContent = selected.name + " selected. Total and cancellation terms updated."; }); });
  </script>
</body>
</html>
